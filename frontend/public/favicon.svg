<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#863bff"/>
      <stop offset="100%" stop-color="#47bfff"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="8" y1="24" x2="40" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="44" height="44" rx="12" ry="12" fill="url(#bgGrad)"/>
  <!-- Subtle inner glow -->
  <rect x="4" y="4" width="40" height="40" rx="10" ry="10" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Heart shape -->
  <path d="M24 38 C24 38 10 29 10 20 C10 15.5 13.5 12 17.5 12 C20 12 22.5 13.5 24 16 C25.5 13.5 28 12 30.5 12 C34.5 12 38 15.5 38 20 C38 29 24 38 24 38Z" fill="white" fill-opacity="0.2"/>
  <!-- ECG/Pulse line -->
  <polyline points="7,25 14,25 17,25 19,18 21,32 23,14 25,30 27,20 29,25 32,25 41,25" fill="none" stroke="url(#pulseGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Small cross/plus medical symbol -->
  <rect x="21.5" y="7" width="5" height="5" rx="1" fill="white" fill-opacity="0.3"/>
  <rect x="23" y="5.5" width="2" height="8" rx="0.5" fill="white" fill-opacity="0.6"/>
  <rect x="20.5" y="8.5" width="7" height="2" rx="0.5" fill="white" fill-opacity="0.6"/>
</svg>